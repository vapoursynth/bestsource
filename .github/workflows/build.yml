name: Build

on: [push, pull_request, workflow_dispatch]

jobs:
  build-non-windows-wheel:
    strategy:
      matrix:
        include:
        - arch: linux_x86_64
          runs-on: ubuntu-latest
        - arch: linux_aarch64
          runs-on: ubuntu-24.04-arm
        - arch: macosx_x86_64
          runs-on: macos-15-intel
        - arch: macosx_arm64
          runs-on: macos-15
      fail-fast: false

    runs-on: ${{ matrix.runs-on }}

    steps:
    - uses: actions/checkout@v7

    - uses: pypa/cibuildwheel@v4.1.0
      env:
        CIBW_BUILD: cp314-*
        CIBW_BUILD_FRONTEND: uv
        CIBW_CONFIG_SETTINGS: setup-args="-Db_lto=true"
        CIBW_ENVIRONMENT_MACOS: MACOSX_DEPLOYMENT_TARGET=15
        CIBW_BEFORE_ALL_LINUX: >
          if command -v dnf >/dev/null 2>&1; then
            dnf -y install libjpeg-turbo-devel libjxl-devel libtiff-devel libxml2-devel meson nasm opus-devel vulkan-loader-devel xxhash-devel
          else
            apk add --no-cache libjpeg-turbo-dev libjxl-dev libxml2-dev meson nasm opus-dev tiff-dev vulkan-loader-dev xxhash-dev
          fi &&
          git clone https://github.com/videolan/dav1d.git --depth 1 &&
          cd dav1d &&
          meson setup build -Dprefix=/usr -Denable_tools=false -Denable_tests=false &&
          meson compile -C build &&
          meson install -C build &&
          cd .. &&
          rm -rf dav1d &&
          git clone https://github.com/mm2/Little-CMS.git --depth 1 &&
          cd Little-CMS &&
          meson setup build -Dprefix=/usr -Dtests=disabled &&
          meson compile -C build &&
          meson install -C build &&
          cd .. &&
          rm -rf Little-CMS &&
          git clone https://github.com/FFmpeg/FFmpeg.git --branch n8.1 --depth 1 &&
          cd FFmpeg &&
          ./configure --enable-gpl --enable-version3 --disable-programs --disable-doc --disable-avdevice --disable-swresample --disable-swscale --disable-avfilter --disable-encoders --disable-muxers --enable-lcms2 --enable-libdav1d --enable-libjxl --enable-libopus --enable-libxml2 --enable-pic --disable-debug &&
          make -j$(nproc) &&
          make install -j$(nproc) &&
          cd .. &&
          rm -rf FFmpeg
        CIBW_BEFORE_ALL_MACOS: >
          brew install dav1d jpeg-xl libxml2 little-cms2 nasm opus vulkan-loader xxhash &&
          git clone https://github.com/FFmpeg/FFmpeg.git --branch n8.1 --depth 1 &&
          cd FFmpeg &&
          ./configure --enable-gpl --enable-version3 --disable-programs --disable-doc --disable-avdevice --disable-swresample --disable-swscale --disable-avfilter --disable-encoders --disable-muxers --enable-lcms2 --enable-libdav1d --enable-libjxl --enable-libopus --enable-libxml2 --enable-pic --disable-debug &&
          make -j3 &&
          sudo make install -j3 &&
          cd .. &&
          rm -rf FFmpeg
      with:
        output-dir: dist
        extras: uv

    - name: Fix tag
      run: |
        pipx run wheel tags --remove --python-tag py3 --abi-tag none dist/*.whl

    - uses: actions/upload-artifact@v7
      with:
        name: bestsource-${{ matrix.arch }}
        path: dist

  build-windows-wheel:
    runs-on: windows-latest

    defaults:
      run:
        shell: msys2 {0}

    steps:
    - uses: actions/checkout@v7

    - uses: msys2/setup-msys2@v2
      with:
        msystem: CLANG64
        update: true
        pacboy: >-
          autotools:p
          cmake:p
          dav1d:p
          git:p
          lcms2:p
          libjxl:p
          libxml2:p
          nasm:p
          ninja:p
          opus:p
          python-wheel:p
          toolchain:p
          uv:p
          vulkan-headers:p
          xxhash:p

    - name: Install davs2
      run: |
        git clone https://github.com/pkuvcl/davs2.git --depth 1
        pushd davs2/build/linux
        CC=clang++ ./configure --prefix=/clang64 --disable-cli --enable-pic
        make install -j$(nproc)
        popd
        rm -rf davs2

    - name: Install nv-codec-headers
      run: |
        git clone https://github.com/FFmpeg/nv-codec-headers.git --depth 1
        pushd nv-codec-headers
        make install -j$(nproc) PREFIX=/clang64
        popd
        rm -rf nv-codec-headers

    - name: Install uavs3d
      run: |
        git clone https://github.com/uavs3/uavs3d.git --depth 1
        pushd uavs3d
        cmake -S . -B build -DCMAKE_POLICY_VERSION_MINIMUM=3.10 -DCOMPILE_10BIT=1 --install-prefix /clang64
        ninja -C build install
        popd
        rm -rf uavs3d

    - name: Install XEVD
      run: |
        git clone https://github.com/mpeg5/xevd.git
        pushd xevd
        cmake -S . -B build --install-prefix /clang64
        ninja -C build install
        popd
        rm -rf xevd
        mv /clang64/lib/xevd/libxevd.a /clang64/lib

    - name: Install FFmpeg
      run: |
        git clone https://github.com/FFmpeg/FFmpeg.git --branch n8.1 --depth 1
        pushd FFmpeg
        ./configure --prefix=/clang64 --enable-gpl --enable-version3 --disable-programs --disable-doc --disable-avdevice --disable-swresample --disable-swscale --disable-avfilter --disable-encoders --disable-muxers --enable-lcms2 --enable-libdav1d --enable-libdavs2 --enable-libjxl --enable-libopus --enable-libuavs3d --enable-libxevd --enable-libxml2 --disable-nvenc --cc=clang --cxx=clang++ --pkg-config-flags=--static --enable-pic --disable-debug
        make install -j$(nproc)
        popd
        rm -rf FFmpeg

    - name: Build
      run: |
        uv build -Csetup-args="-Dprefer_static=true" -Csetup-args="-Db_lto=true" -Csetup-args="-Dcpp_link_args=-static" -Csetup-args="-Denable_avisynth=false"

    - name: Fix tag and strip dll
      run: |
        cd dist
        wheel tags --remove --python-tag py3 --abi-tag none *.whl
        wheel unpack --dest unpacked *.whl
        rm *.whl
        strip $(find . -name '*.dll')
        wheel pack unpacked/*

    - uses: actions/upload-artifact@v7
      with:
        name: bestsource-sdist
        path: dist/*.tar.gz

    - uses: actions/upload-artifact@v7
      with:
        name: bestsource-win_amd64
        path: dist/*.whl

  build-windows-msvc:
    runs-on: windows-latest

    env:
      # x64-windows-static plus VCPKG_BUILD_TYPE release, shipped with vcpkg as a community
      # triplet. Only the release configuration of each dependency is ever linked here, so
      # building the debug one as well would roughly double the cold build for nothing.
      VCPKG_TRIPLET: x64-windows-static-release
      VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}\vcpkg-bincache

    steps:
    - uses: actions/checkout@v7

    # The VapourSynth wheel is limited-API (cp312-abi3), so any Python >= 3.12 can import it
    # for the vs.get_include() lookup in meson.build.
    - uses: actions/setup-python@v6
      with:
        python-version: '3.14'

    - uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x64

    - name: Install build tools
      run: pip install meson ninja vapoursynth

    - name: Prepare vcpkg binary cache
      run: New-Item -ItemType Directory -Force -Path $env:VCPKG_DEFAULT_BINARY_CACHE

    # A cold FFmpeg build here takes tens of minutes. vcpkg's binary cache is content addressed
    # per package, so an older restore-keys hit still avoids rebuilding everything.
    - uses: actions/cache@v4
      with:
        path: ${{ env.VCPKG_DEFAULT_BINARY_CACHE }}
        key: vcpkg-${{ env.VCPKG_TRIPLET }}-${{ hashFiles('.github/workflows/build.yml') }}
        restore-keys: vcpkg-${{ env.VCPKG_TRIPLET }}-

    # Dependency set as documented in README.md. Note this is without Little CMS2 support, and
    # vcpkg's ffmpeg port has no feature for libjxl/libdavs2/libuavs3d/libxevd either, so this
    # build decodes less than the CLANG64 one above.
    - name: Install dependencies
      # --vcpkg-root is passed explicitly because the developer environment set up above exports
      # VCPKG_ROOT pointing at the vcpkg bundled with Visual Studio, which is not the one being
      # used here. Without it vcpkg warns about the mismatch, and anything that does honour the
      # variable would look in the wrong tree.
      run: |
        & "$env:VCPKG_INSTALLATION_ROOT\vcpkg.exe" install --vcpkg-root "$env:VCPKG_INSTALLATION_ROOT" --triplet $env:VCPKG_TRIPLET `
          "ffmpeg[avcodec,avdevice,avfilter,avformat,swresample,swscale,zlib,bzip2,core,dav1d,gpl,version3,lzma,nvcodec,qsv,vulkan,openssl,xml2]" `
          xxhash
        & "$env:VCPKG_INSTALLATION_ROOT\vcpkg.exe" install --vcpkg-root "$env:VCPKG_INSTALLATION_ROOT" --triplet $env:VCPKG_TRIPLET pkgconf

    # enable_plugin builds both the VapourSynth and AviSynth+ bindings into the one dll;
    # libp2p and AviSynth+ come from the subproject wraps. b_vscrt=mt matches the static CRT
    # that the triplet builds its libraries against, and prefer_static makes meson ask pkgconf
    # for Libs.private so the transitive static deps get linked.
    - name: Build
      run: |
        $env:PKG_CONFIG = "$env:VCPKG_INSTALLATION_ROOT\installed\$env:VCPKG_TRIPLET\tools\pkgconf\pkgconf.exe"
        $env:PKG_CONFIG_PATH = "$env:VCPKG_INSTALLATION_ROOT\installed\$env:VCPKG_TRIPLET\lib\pkgconfig"
        meson setup build -Denable_plugin=true -Dprefer_static=true -Db_lto=true -Db_vscrt=mt
        meson compile -C build

    - uses: actions/upload-artifact@v7
      with:
        name: msvc-win_amd64
        path: build/bestsource.dll

  publish:
    permissions:
      id-token: write
    needs: [build-non-windows-wheel, build-windows-wheel]
    if: ${{ startsWith(github.ref, 'refs/tags/R') }}
    runs-on: ubuntu-latest

    steps:
    # Only the wheel/sdist artifacts, so the raw dll from build-windows-msvc is left out.
    - uses: actions/download-artifact@v8
      with:
        path: dist
        pattern: bestsource-*
        merge-multiple: true

    - uses: pypa/gh-action-pypi-publish@release/v1

  release:
    permissions:
      contents: write
    needs: [build-windows-wheel, build-windows-msvc]
    if: ${{ startsWith(github.ref, 'refs/tags/R') }}
    runs-on: ubuntu-latest

    steps:
    - uses: actions/download-artifact@v8
      with:
        name: msvc-win_amd64
        path: msvc

    - uses: actions/download-artifact@v8
      with:
        name: bestsource-win_amd64
        path: clang

    # Both dlls are labelled by toolchain in the filename. The clang build targets
    # x86_64-w64-windows-gnu, whose C++ ABI cannot match the MSVC built AviSynth+, so it
    # is built with enable_avisynth=false and exports VapourSynthPluginInit2 only --
    # hence vs-only. The clang dll is taken out of the wheel so the build job that
    # produces it stays untouched. The release normally already exists by this point;
    # create it if the tag was pushed on its own.
    - name: Attach Windows builds to the release
      env:
        GH_TOKEN: ${{ github.token }}
        # This job only downloads artifacts, it never checks out, so gh has no git remote to
        # infer the repository from and every command below would fail on "not a git repository".
        GH_REPO: ${{ github.repository }}
      run: |
        tag="${{ github.ref_name }}"
        msvc_asset="BestSource-$tag-win64-msvc.dll"
        clang_asset="BestSource-$tag-win64-clang-vs-only.dll"

        mv msvc/bestsource.dll "$msvc_asset"

        # Matched loosely on purpose: the gnu toolchain names it libbestsource.dll, msvc
        # would name it bestsource.dll. The wheel is statically linked so it holds one dll.
        unzip -q clang/*.whl -d clang-extract
        clang_dll="$(find clang-extract -name '*.dll' -print -quit)"
        test -n "$clang_dll" || { echo "no dll inside the clang wheel"; exit 1; }
        mv "$clang_dll" "$clang_asset"

        gh release view "$tag" >/dev/null 2>&1 \
          || gh release create "$tag" --title "$tag" --generate-notes
        gh release upload "$tag" "$msvc_asset" "$clang_asset" --clobber
